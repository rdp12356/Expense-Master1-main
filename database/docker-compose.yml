version: '3.8'

services:
  db:
    image: postgres:15
    container_name: expensemaster_db
    environment:
      POSTGRES_USER: expense_admin
      POSTGRES_PASSWORD: expense_password
      POSTGRES_DB: expense_master
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
